version: '3.8'

services:

  # ── HUBKEALEX ──────────────────────────────────────────────────────────
  hubkealex:
    build: .
    container_name: hubkealex
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=srv1078.hstgr.io
      - DB_PORT=3306
      - DB_NAME=u549746795_kealex
      - DB_USER=u549746795_kealex
      - DB_PASSWORD=Sally2026%40%21%40
      - JWT_SECRET=your-super-secret-jwt-key
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.hubkealex.rule=(Host(`srv1023256.hstgr.cloud`) || Host(`kealabs.cloud`) || Host(`www.kealabs.cloud`)) && (PathPrefix(`/k1/lex`) || PathPrefix(`/v1/lex`))"
      - "traefik.http.routers.hubkealex.entrypoints=https"
      - "traefik.http.routers.hubkealex.tls=true"
      - "traefik.http.routers.hubkealex.middlewares=hubkealex-compress"
      - "traefik.http.middlewares.hubkealex-compress.compress=true"
      - "traefik.http.services.hubkealex.loadbalancer.server.port=8000"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/k1/lex/health', timeout=5)"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    networks:
      - kealabs-net
      - easypanel

networks:
  kealabs-net:
    external: true
  easypanel:
    external: true
