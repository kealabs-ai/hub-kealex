version: '3.8'

services:

  # ── HUBKEALEX ──────────────────────────────────────────────────────────
  hubkealex:
    build: .
    container_name: hubkealex
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=${DATABASE_URL:-mysql+pymysql://u549746795_kealex:Sally2026%40%21%40@srv1078.hstgr.io:3306/u549746795_kealex}
      - MYSQL_HOST=${MYSQL_HOST:-srv1078.hstgr.io}
      - MYSQL_PORT=${MYSQL_PORT:-3306}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-u549746795_kealex}
      - MYSQL_USER=${MYSQL_USER:-u549746795_kealex}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-Sally2026@!@}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.hubkealex.rule=(Host(`srv1023256.hstgr.cloud`) || Host(`kealabs.cloud`) || Host(`www.kealabs.cloud`)) && PathPrefix(`/v1/lex`)"
      - "traefik.http.routers.hubkealex.entrypoints=https"
      - "traefik.http.routers.hubkealex.tls=true"
      - "traefik.http.middlewares.hubkealex-cors.headers.accesscontrolalloworiginlist=https://kealabs.cloud,https://www.kealabs.cloud,https://srv1023256.hstgr.cloud,https://kealabs.com.br,https://www.kealabs.com.br,http://localhost:3000"
      - "traefik.http.middlewares.hubkealex-cors.headers.accesscontrolallowmethods=GET,POST,PUT,DELETE,OPTIONS"
      - "traefik.http.middlewares.hubkealex-cors.headers.accesscontrolallowheaders=Content-Type,Authorization,Accept"
      - "traefik.http.middlewares.hubkealex-cors.headers.accesscontrolallowcredentials=true"
      - "traefik.http.middlewares.hubkealex-cors.headers.accesscontrolmaxage=86400"
      - "traefik.http.middlewares.hubkealex-cors.headers.addvaryheader=true"
      - "traefik.http.routers.hubkealex.middlewares=hubkealex-cors"
      - "traefik.http.services.hubkealex.loadbalancer.server.port=8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    networks:
      - easypanel
    restart: unless-stopped

networks:
  easypanel:
    external: true