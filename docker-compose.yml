      svc-auth:
        condition: service_healthy
      svc-processos:
        condition: service_healthy
      svc-documentos:
        condition: service_healthy
      svc-financeiro:
        condition: service_healthy
      svc-prazos:
        condition: service_healthy
      svc-usuarios:
