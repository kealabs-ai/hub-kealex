version: '3.8'

networks:
  easypanel:
    external: true
  kealex-internal:
    driver: bridge
    name: kealex-internal

services:
  svc-auth:
    build: ./svc-auth
    image: kealex/svc-auth:latest
    container_name: svc-auth
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=${DATABASE_URL}
    networks:
      - kealex-internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/health\")' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  svc-processos:
    build: ./svc-processos
    image: kealex/svc-processos:latest
    container_name: svc-processos
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=${DATABASE_URL}
    networks:
      - kealex-internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/health\")' || exit 1"]
