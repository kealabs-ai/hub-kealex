services:
  svc-auth:
    build: ./svc-auth
    container_name: kealex-svc-auth
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=${DATABASE_URL}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.kealex-auth.rule=Host(`srv1023256.hstgr.cloud`) && PathPrefix(`/api/kealex/auth`)"
      - "traefik.http.routers.kealex-auth.entrypoints=https"
      - "traefik.http.routers.kealex-auth.tls=true"
      - "traefik.http.middlewares.kealex-strip-auth.stripprefix.prefixes=/api/kealex"
      - "traefik.http.middlewares.kealex-cors.headers.accesscontrolalloworiginlist=https://srv1023256.hstgr.cloud,http://localhost:5173,http://localhost:3000"
      - "traefik.http.middlewares.kealex-cors.headers.accesscontrolallowmethods=GET,POST,PUT,DELETE,OPTIONS"
      - "traefik.http.middlewares.kealex-cors.headers.accesscontrolallowheaders=Content-Type,Authorization,Accept,X-Requested-With"
      - "traefik.http.middlewares.kealex-cors.headers.accesscontrolmaxage=86400"
      - "traefik.http.middlewares.kealex-cors.headers.addvaryheader=true"
      - "traefik.http.middlewares.kealex-cors.headers.accesscontrolallowcredentials=true"
      - "traefik.http.routers.kealex-auth.middlewares=kealex-strip-auth,kealex-cors"
      - "traefik.http.services.kealex-auth.loadbalancer.server.port=8000"
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    networks:
      - easypanel
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

