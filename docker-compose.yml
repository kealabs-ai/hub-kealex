      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/health\")' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  svc-configuracoes:
    build: ./svc-configuracoes
    image: kealex/svc-configuracoes:latest
    container_name: svc-configuracoes
    environment:
      - SECRET_KEY=${SECRET_KEY}
