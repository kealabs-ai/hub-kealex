  svc-clientes:
    build: ./svc-clientes
    image: kealex/svc-clientes:latest
    container_name: svc-clientes
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=${DATABASE_URL}
    networks:
      - kealex-internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/health\")' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  api-gateway:
    build: ./api-gateway
    image: kealex/api-gateway:latest
    container_name: api-gateway
    ports:
      - "8000:80"
    depends_on:
      - svc-auth
      - svc-processos
      - svc-documentos
      - svc-financeiro
      - svc-prazos
      - svc-usuarios
      - svc-configuracoes
      - svc-escritorios
      - svc-clientes
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=easypanel"
      - "traefik.http.routers.kealex-api.rule=Host(`srv1023256.hstgr.cloud`) && PathPrefix(`/kealex`)"
      - "traefik.http.routers.kealex-api.entrypoints=websecure"
      - "traefik.http.routers.kealex-api.tls=true"
      - "traefik.http.routers.kealex-api.service=kealex-api"
      - "traefik.http.services.kealex-api.loadbalancer.server.port=80"
      - "traefik.http.middlewares.kealex-strip.stripprefix.prefixes=/kealex"
      - "traefik.http.middlewares.kealex-cors.headers.accesscontrolalloworiginlist=*"
      - "traefik.http.middlewares.kealex-cors.headers.accesscontrolallowmethods=GET,POST,PUT,DELETE,OPTIONS"
      - "traefik.http.middlewares.kealex-cors.headers.accesscontrolallowheaders=*"
      - "traefik.http.middlewares.kealex-cors.headers.accesscontrolallowcredentials=true"
      - "traefik.http.routers.kealex-api.middlewares=kealex-strip,kealex-cors"
      - "traefik.http.routers.kealex-api.priority=200"
    networks:
      - easypanel
      - kealex-internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s