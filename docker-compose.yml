      - "traefik.http.routers.kealex-processos.rule=Host(`${DOMAIN}`) && PathPrefix(`/v1/lex/processos`)"
      - "traefik.http.routers.kealex-processos.entrypoints=https"
      - "traefik.http.routers.kealex-processos.tls=true"
      - "traefik.http.routers.kealex-processos.middlewares=kealex-strip-auth,kealex-cors"
      - "traefik.http.services.kealex-processos.loadbalancer.server.port=8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  svc-documentos:
