version: '3.8'

services:

  # ── HUBKEALEX ──────────────────────────────────────────────────────────
  hubkealex:
    build: .
    container_name: hubkealex
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=srv1078.hstgr.io
      - DB_PORT=3306
      - DB_NAME=u549746795_kealex
      - DB_USER=u549746795_kealex
      - DB_PASSWORD=Sally2026%40%21%40
      - JWT_SECRET=your-super-secret-jwt-key
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.hubkealex.rule=Host(`srv1023256.hstgr.cloud`) || Host(`kealabs.cloud`) || Host(`www.kealabs.cloud`)"
      - "traefik.http.routers.hubkealex.entrypoints=https"
      - "traefik.http.routers.hubkealex.tls=true"
      - "traefik.http.routers.hubkealex.middlewares=hubkealex-cors,hubkealex-compress"
      - "traefik.http.middlewares.hubkealex-cors.headers.accesscontrolalloworiginlist=https://darkorange-raven-554257.hostingersite.com,https://kealabs.cloud,https://www.kealabs.cloud,https://kealabs.com.br,https://www.kealabs.com.br"
      - "traefik.http.middlewares.hubkealex-cors.headers.accesscontrolallowmethods=GET,POST,OPTIONS"
      - "traefik.http.middlewares.hubkealex-cors.headers.accesscontrolallowheaders=*"
      - "traefik.http.middlewares.hubkealex-cors.headers.accesscontrolmaxage=3600"
      - "traefik.http.middlewares.hubkealex-cors.headers.accesscontrolallowcredentials=true"
      - "traefik.http.middlewares.hubkealex-cors.headers.addvaryheader=true"
      - "traefik.http.middlewares.hubkealex-compress.compress=true"
      - "traefik.http.services.hubkealex.loadbalancer.server.port=8000"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/k1/lex/health', timeout=5)"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    networks:
      - kealabs-net
      - easypanel

  # ── SVC-COBRANCAS ──────────────────────────────────────────────────────
  svc-cobrancas:
    build: ./svc-cobrancas
    container_name: svc-cobrancas
    ports:
      - "8001:8000"
    environment:
      - DATABASE_URL=mysql+pymysql://u549746795_kealex:Sally2026%40%21%40@srv1078.hstgr.io:3306/u549746795_kealex
      - SECRET_KEY=your-super-secret-jwt-key
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.svc-cobrancas.rule=(Host(`srv1023256.hstgr.cloud`) || Host(`kealabs.cloud`) || Host(`www.kealabs.cloud`)) && (PathPrefix(`/v1/lex/cobrancas`) || PathPrefix(`/k1/lex/cobrancas`))"
      - "traefik.http.routers.svc-cobrancas.entrypoints=https"
      - "traefik.http.routers.svc-cobrancas.tls=true"
      - "traefik.http.routers.svc-cobrancas.priority=10"
      - "traefik.http.routers.svc-cobrancas.middlewares=svc-cobrancas-cors,svc-cobrancas-compress,svc-cobrancas-strip"
      - "traefik.http.middlewares.svc-cobrancas-strip.stripprefix.prefixes=/v1/lex,/k1/lex"
      - "traefik.http.middlewares.svc-cobrancas-cors.headers.accesscontrolalloworiginlist=https://darkorange-raven-554257.hostingersite.com,https://kealabs.cloud,https://www.kealabs.cloud,https://kealabs.com.br,https://www.kealabs.com.br"
      - "traefik.http.middlewares.svc-cobrancas-cors.headers.accesscontrolallowmethods=GET,POST,OPTIONS"
      - "traefik.http.middlewares.svc-cobrancas-cors.headers.accesscontrolallowheaders=*"
      - "traefik.http.middlewares.svc-cobrancas-cors.headers.accesscontrolmaxage=3600"
      - "traefik.http.middlewares.svc-cobrancas-cors.headers.accesscontrolallowcredentials=true"
      - "traefik.http.middlewares.svc-cobrancas-cors.headers.addvaryheader=true"
      - "traefik.http.middlewares.svc-cobrancas-compress.compress=true"
      - "traefik.http.services.svc-cobrancas.loadbalancer.server.port=8000"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    networks:
      - kealabs-net
      - easypanel

networks:
  kealabs-net:
    external: true
  easypanel:
    external: true
