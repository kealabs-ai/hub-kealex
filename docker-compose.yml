version: '3.8'

services:
  svc-auth:
    build: ./svc-auth
    container_name: kealex-svc-auth
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=${DATABASE_URL}
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=easypanel"
      - "traefik.http.routers.kealex-auth.rule=Host(`srv1023256.hstgr.cloud`) && PathPrefix(`/k1/kealex/auth`)"
      - "traefik.http.routers.kealex-auth.entrypoints=websecure"
      - "traefik.http.routers.kealex-auth.tls=true"
      - "traefik.http.routers.kealex-auth.service=kealex-auth"
      - "traefik.http.services.kealex-auth.loadbalancer.server.port=8000"
      - "traefik.http.middlewares.kealex-auth-strip.stripprefix.prefixes=/k1/kealex"
      - "traefik.http.middlewares.kealex-auth-cors.headers.accesscontrolalloworiginlist=*"
      - "traefik.http.middlewares.kealex-auth-cors.headers.accesscontrolallowmethods=GET,POST,PUT,DELETE,OPTIONS"
      - "traefik.http.middlewares.kealex-auth-cors.headers.accesscontrolallowheaders=*"
      - "traefik.http.middlewares.kealex-auth-cors.headers.accesscontrolallowcredentials=true"
      - "traefik.http.routers.kealex-auth.middlewares=kealex-auth-strip,kealex-auth-cors"
      - "traefik.http.routers.kealex-auth.priority=100"
    networks:
      - easypanel
    restart: unless-stopped
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/health\")' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

