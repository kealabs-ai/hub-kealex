    container_name: kealex-svc-financeiro
    ports:
      - "8004:8000"
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=${DATABASE_URL}
    networks:
      - kealex-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  svc-prazos:
    build: ./svc-prazos
    container_name: kealex-svc-prazos
    ports:
      - "8005:8000"
    environment:
      - SECRET_KEY=${SECRET_KEY}
