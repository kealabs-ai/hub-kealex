      start_period: 40s

  svc-usuarios:
    build: ./svc-usuarios
    container_name: kealex-svc-usuarios
    ports:
      - "8006:8000"
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=${DATABASE_URL}
    networks:
      - kealex-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  svc-configuracoes:
    build: ./svc-configuracoes
    container_name: kealex-svc-configuracoes
    ports:
      - "8007:8000"
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=${DATABASE_URL}
    networks:
      - kealex-network
    restart: unless-stopped
