version: '3.8'

networks:
  kealex-network:
    driver: bridge
    name: kealex-network

services:
  kealex-svc-auth:
    build: ./svc-auth
    image: kealex/svc-auth:latest
    container_name: kealex-svc-auth
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=${DATABASE_URL}
    ports:
      - "8001:8000"
    networks:
      - kealex-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/health\")' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  kealex-svc-processos:
    build: ./svc-processos
    image: kealex/svc-processos:latest
