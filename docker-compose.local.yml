      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  svc-clientes:
    build: ./svc-clientes
    container_name: kealex-svc-clientes
    ports:
      - "8009:8000"
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=${DATABASE_URL}
    networks:
      - kealex-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # API Gateway (start last)
  api-gateway:
    build: ./api-gateway
    container_name: kealex-api-gateway
    ports:
      - "8000:80"
    depends_on:
      svc-auth:
        condition: service_healthy
      svc-processos:
        condition: service_healthy
      svc-documentos:
        condition: service_healthy
      svc-financeiro:
        condition: service_healthy
      svc-prazos:
        condition: service_healthy
      svc-usuarios:
        condition: service_healthy
      svc-configuracoes:
        condition: service_healthy
      svc-escritorios:
        condition: service_healthy
      svc-clientes:
        condition: service_healthy
    networks:
      - kealex-network
    restart: unless-stopped