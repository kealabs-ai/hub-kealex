version: '3.8'

networks:
  kealex-network:
    driver: bridge

services:
  # API Gateway
  api-gateway:
    build: ./api-gateway
    container_name: kealex-api-gateway
    ports:
      - "8000:80"
    depends_on:
      - svc-auth
      - svc-processos
      - svc-documentos
      - svc-financeiro
      - svc-prazos
      - svc-usuarios
      - svc-configuracoes
      - svc-escritorios
      - svc-clientes
      - svc-cobrancas
    networks:
      - kealex-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # Microservices
  svc-auth:
    build: ./svc-auth
    container_name: kealex-svc-auth
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=${DATABASE_URL}
    networks:
      - kealex-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  svc-processos:
    build: ./svc-processos
    container_name: kealex-svc-processos
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=${DATABASE_URL}
    networks:
      - kealex-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  svc-documentos:
