version: '3.8'

networks:
  easypanel:
    external: true
  kealex-internal:
    driver: bridge
    internal: false

services:
  kealex-svc-auth:
    build: ./svc-auth
    image: kealex/svc-auth:latest
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=${DATABASE_URL}
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=easypanel"
      - "traefik.http.routers.kealex-auth.rule=(Host(`srv1023256.hstgr.cloud`) || Host(`kealex.com.br`) || Host(`www.kealex.com.br`)) && PathPrefix(`/v1/lex/auth`)"
      - "traefik.http.routers.kealex-auth.entrypoints=https"
      - "traefik.http.routers.kealex-auth.tls=true"
      - "traefik.http.routers.kealex-auth.service=kealex-auth"
      - "traefik.http.services.kealex-auth.loadbalancer.server.port=8000"
      - "traefik.http.middlewares.kealex-auth-strip.stripprefix.prefixes=/v1/lex"
      - "traefik.http.middlewares.kealex-cors.headers.accesscontrolalloworiginlist=*"
      - "traefik.http.middlewares.kealex-cors.headers.accesscontrolallowmethods=GET,POST,PUT,DELETE,OPTIONS"
      - "traefik.http.middlewares.kealex-cors.headers.accesscontrolallowheaders=*"
      - "traefik.http.middlewares.kealex-cors.headers.accesscontrolallowcredentials=true"
      - "traefik.http.routers.kealex-auth.middlewares=kealex-auth-strip,kealex-cors"
      - "traefik.http.routers.kealex-auth.priority=100"
    networks:
      - easypanel
      - kealex-internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/health\")' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

