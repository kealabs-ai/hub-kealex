version: '3.8'

services:
  svc-auth:
    build: ./svc-auth
    container_name: kealex-svc-auth
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=${DATABASE_URL}
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=easypanel"
      - "traefik.http.routers.kealex-auth.rule=Host(`srv1023256.hstgr.cloud`) && PathPrefix(`/k1/kealex/auth`)"
      - "traefik.http.routers.kealex-auth.entrypoints=websecure"
      - "traefik.http.routers.kealex-auth.tls=true"
      - "traefik.http.middlewares.kealex-strip.stripprefix.prefixes=/k1/kealex"
      - "traefik.http.middlewares.kealex-cors.headers.accesscontrolalloworiginlist=*"
      - "traefik.http.middlewares.kealex-cors.headers.accesscontrolallowmethods=GET,POST,PUT,DELETE,OPTIONS"
      - "traefik.http.middlewares.kealex-cors.headers.accesscontrolallowheaders=*"
      - "traefik.http.middlewares.kealex-cors.headers.accesscontrolallowcredentials=true"
      - "traefik.http.routers.kealex-auth.middlewares=kealex-strip,kealex-cors"
      - "traefik.http.services.kealex-auth.loadbalancer.server.port=8000"
    networks:
      - easypanel
    restart: unless-stopped

  svc-processos:
