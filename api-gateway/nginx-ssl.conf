# Production nginx configuration with SSL
# Copy this to /etc/nginx/conf.d/default.conf and update SSL certificate paths

# Upstream definitions for microservices
upstream svc_auth {
    server svc-auth:8000;
}

upstream svc_processos {
    server svc-processos:8000;
}

upstream svc_documentos {
    server svc-documentos:8000;
}

upstream svc_financeiro {
    server svc-financeiro:8000;
}

upstream svc_prazos {
    server svc-prazos:8000;
}

upstream svc_usuarios {
    server svc-usuarios:8000;
}

upstream svc_configuracoes {
    server svc-configuracoes:8000;
}

upstream svc_escritorios {
    server svc-escritorios:8000;
}

upstream svc_clientes {
    server svc-clientes:8000;
}

server {
    listen 80;
    server_name kealex.com www.kealex.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name kealex.com www.kealex.com;

    # SSL certificates - UPDATE THESE PATHS
    ssl_certificate /etc/ssl/certs/kealex.crt;
    ssl_certificate_key /etc/ssl/private/kealex.key;
    
    # SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    
    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # CORS headers
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With" always;
    add_header Access-Control-Allow-Credentials "true" always;
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;
    
    # Handle preflight requests
    location / {
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin "*";
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With";
            add_header Access-Control-Max-Age 86400;
            add_header Content-Type 'text/plain charset=UTF-8';
            add_header Content-Length 0;
            return 204;
        }
    }
    
    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
    
    # Common proxy settings
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    
    proxy_connect_timeout 30s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
    
    proxy_buffering on;
    proxy_buffer_size 4k;
    proxy_buffers 8 4k;
    proxy_busy_buffers_size 8k;
    
    # Auth service
    location /v1/lex/auth {
        proxy_pass http://svc_auth;
    }
    
    # Processos service
    location /v1/lex/processos {
        proxy_pass http://svc_processos;
    }
    
    # Documentos service
    location /v1/lex/documentos {
        proxy_pass http://svc_documentos;
    }
    
    # Financeiro service
    location /v1/lex/financeiro {
        proxy_pass http://svc_financeiro;
    }
    
    # Prazos service
    location /v1/lex/prazos {
        proxy_pass http://svc_prazos;
    }
    
    # Usuarios service
    location /v1/lex/usuarios {
        proxy_pass http://svc_usuarios;
    }
    
    # Configuracoes service
    location /v1/lex/configuracoes {
        proxy_pass http://svc_configuracoes;
    }
    
    # Escritorios service
    location /v1/lex/escritorios {
        proxy_pass http://svc_escritorios;
    }
    
    # Clientes service
    location /v1/lex/clientes {
        proxy_pass http://svc_clientes;
    }
    
    # Backward compatibility - redirect old URLs to new v1/lex/ prefix
    location ~ ^/(auth|processos|documentos|financeiro|prazos|usuarios|configuracoes|escritorios|clientes)(.*)$ {
        return 301 /v1/lex/$1$2;
    }
    
    # Error pages
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
    
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        internal;
    }
}