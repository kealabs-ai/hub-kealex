server {
    listen 80;
    resolver 127.0.0.11 valid=10s;

    location /v1/lex/auth/ {
        set $upstream http://svc-auth:8000;
        rewrite ^/v1/lex/auth/(.*) /auth/$1 break;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /v1/lex/auth {
        set $upstream http://svc-auth:8000;
        rewrite ^/v1/lex/auth$ /auth break;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /v1/lex/processos {
        set $upstream http://svc-processos:8000;
        rewrite ^/v1/lex/processos(.*) /processos$1 break;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /v1/lex/documentos {
        set $upstream http://svc-documentos:8000;
        rewrite ^/v1/lex/documentos(.*) /documentos$1 break;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /v1/lex/financeiro {
        set $upstream http://svc-financeiro:8000;
        rewrite ^/v1/lex/financeiro(.*) /financeiro$1 break;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /v1/lex/prazos {
        set $upstream http://svc-prazos:8000;
        rewrite ^/v1/lex/prazos(.*) /prazos$1 break;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /v1/lex/usuarios {
        set $upstream http://svc-usuarios:8000;
        rewrite ^/v1/lex/usuarios(.*) /usuarios$1 break;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /v1/lex/configuracoes {
        set $upstream http://svc-configuracoes:8000;
        rewrite ^/v1/lex/configuracoes(.*) /configuracoes$1 break;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /v1/lex/escritorios {
        set $upstream http://svc-escritorios:8000;
        rewrite ^/v1/lex/escritorios(.*) /escritorios$1 break;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /v1/lex/clientes {
        set $upstream http://svc-clientes:8000;
        rewrite ^/v1/lex/clientes(.*) /clientes$1 break;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Backward compatibility - redirect old URLs to new v1/lex/ prefix
    location ~ ^/(auth|processos|documentos|financeiro|prazos|usuarios|configuracoes|escritorios|clientes)(.*)$ {
        return 301 /v1/lex/$1$2;
    }
}