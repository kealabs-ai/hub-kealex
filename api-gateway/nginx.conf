upstream svc_auth       { server svc-auth:8000; }
upstream svc_processos  { server svc-processos:8000; }
upstream svc_documentos { server svc-documentos:8000; }
upstream svc_financeiro { server svc-financeiro:8000; }
upstream svc_prazos     { server svc-prazos:8000; }
upstream svc_usuarios       { server svc-usuarios:8000; }
upstream svc_configuracoes  { server svc-configuracoes:8000; }
upstream svc_escritorios    { server svc-escritorios:8000; }

server {
    listen 8000;

    location /auth/ {
        proxy_pass http://svc_auth/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /auth {
        proxy_pass http://svc_auth/auth;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /processos {
        proxy_pass http://svc_processos;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /documentos {
        proxy_pass http://svc_documentos;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /financeiro {
        proxy_pass http://svc_financeiro;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /prazos {
        proxy_pass http://svc_prazos;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /usuarios {
        proxy_pass http://svc_usuarios;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /configuracoes {
        proxy_pass http://svc_configuracoes;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /escritorios {
        proxy_pass http://svc_escritorios;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
