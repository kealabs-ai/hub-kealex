# Upstream definitions for microservices
upstream svc_auth {
    server kealex-svc-auth:8000 max_fails=3 fail_timeout=30s;
}

upstream svc_processos {
    server kealex-svc-processos:8000 max_fails=3 fail_timeout=30s;
}

upstream svc_documentos {
    server kealex-svc-documentos:8000 max_fails=3 fail_timeout=30s;
}

upstream svc_financeiro {
    server kealex-svc-financeiro:8000 max_fails=3 fail_timeout=30s;
}

upstream svc_prazos {
    server kealex-svc-prazos:8000 max_fails=3 fail_timeout=30s;
}

upstream svc_usuarios {
    server kealex-svc-usuarios:8000 max_fails=3 fail_timeout=30s;
}

upstream svc_configuracoes {
    server kealex-svc-configuracoes:8000 max_fails=3 fail_timeout=30s;
}

upstream svc_escritorios {
    server kealex-svc-escritorios:8000 max_fails=3 fail_timeout=30s;
}

upstream svc_clientes {
    server kealex-svc-clientes:8000 max_fails=3 fail_timeout=30s;
}

server {
    listen 80;
    server_name localhost;
    
    # Resolver DNS do Docker com cache
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # CORS headers
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With" always;
    add_header Access-Control-Allow-Credentials "true" always;

    # Handle preflight requests
    location / {
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin "*";
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With";
            add_header Access-Control-Max-Age 86400;
            add_header Content-Type 'text/plain charset=UTF-8';
            add_header Content-Length 0;
            return 204;
        }
        
        # Página inicial da API
        return 200 '{"message":"Kealex API Gateway","version":"1.0","endpoints":["/v1/lex/auth","/v1/lex/processos","/v1/lex/documentos","/v1/lex/financeiro","/v1/lex/prazos","/v1/lex/usuarios","/v1/lex/configuracoes","/v1/lex/escritorios","/v1/lex/clientes"]}';
        add_header Content-Type application/json;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Auth service
    location /v1/lex/auth {
        proxy_pass http://svc_auth;
        proxy_redirect off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        
        # Buffer settings
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
    }

    # Processos service
    location /v1/lex/processos {
        proxy_pass http://svc_processos;
        proxy_redirect off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
    }

    # Documentos service
    location /v1/lex/documentos {
        proxy_pass http://svc_documentos;
        proxy_redirect off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
    }

    # Financeiro service
    location /v1/lex/financeiro {
        proxy_pass http://svc_financeiro;
        proxy_redirect off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
    }

    # Prazos service
    location /v1/lex/prazos {
        proxy_pass http://svc_prazos;
        proxy_redirect off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_connect_timeout 30s;
