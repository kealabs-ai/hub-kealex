# Upstream definitions for microservices
upstream svc_auth {
    server kealex-svc-auth:8000;
}

upstream svc_processos {
    server kealex-svc-processos:8000;
}

upstream svc_documentos {
    server kealex-svc-documentos:8000;
}

upstream svc_financeiro {
    server kealex-svc-financeiro:8000;
}

upstream svc_prazos {
    server kealex-svc-prazos:8000;
}

upstream svc_usuarios {
    server kealex-svc-usuarios:8000;
}

upstream svc_configuracoes {
    server kealex-svc-configuracoes:8000;
}

upstream svc_escritorios {
    server kealex-svc-escritorios:8000;
}

upstream svc_clientes {
    server kealex-svc-clientes:8000;
}

server {
    listen 80;
    server_name localhost;
    
    # Remove resolver que pode estar causando problemas
    # resolver 127.0.0.11 valid=10s;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # CORS headers
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With" always;
    add_header Access-Control-Allow-Credentials "true" always;

    # Handle preflight requests
    location / {
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin "*";
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With";
            add_header Access-Control-Max-Age 86400;
            add_header Content-Type 'text/plain charset=UTF-8';
            add_header Content-Length 0;
            return 204;
        }
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Auth service
    location /v1/lex/auth {
        proxy_pass http://svc_auth$request_uri;
        proxy_redirect off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        
        # Buffer settings
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
    }

    # Processos service
    location /v1/lex/processos {
        proxy_pass http://svc_processos$request_uri;
        proxy_redirect off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
