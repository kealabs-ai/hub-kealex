        proxy_busy_buffers_size 8k;
    }

    # Backward compatibility - redirect old URLs to new k1/lex/ prefix
    location ~ ^/(auth|processos|documentos|financeiro|prazos|usuarios|configuracoes|escritorios|clientes)(.*)$ {
        return 301 /v1/lex/$1$2;
    }

    # Error pages
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        internal;
    }
}