server {
    listen 80;
    resolver 127.0.0.11 valid=10s;

    location /auth/ {
        set $upstream http://svc-auth:8000;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /auth {
        set $upstream http://svc-auth:8000;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /processos {
